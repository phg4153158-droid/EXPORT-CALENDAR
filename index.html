<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>출하 캘린더 · 수출 출하관리</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#E9EDF1; --surface:#FFFFFF; --ink:#16222E; --muted:#5C6B7A;
    --line:#D9E0E7; --line-strong:#C3CDD6;
    --ship:#0B6E78; --ship-soft:#E2F0F1; --ship-ink:#084e55;
    --deadline:#B5481B; --deadline-soft:#FBE7DC; --deadline-ink:#8a3614;
    --lv-green:#E3F2D3; --lv-orange:#FBE4C5; --lv-red:#F4BBAE;
    --mono:ui-monospace,SFMono-Regular,"SF Mono",Menlo,Consolas,monospace;
    --disp:"Space Grotesk",system-ui,sans-serif;
    --body:"Inter",system-ui,-apple-system,"Segoe UI",sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--bg); color:var(--ink); font-family:var(--body);
    font-size:14px; line-height:1.5; -webkit-font-smoothing:antialiased; padding:10px}
  .wrap{max-width:100%; margin:0}

  .topbar{display:flex; align-items:flex-end; justify-content:space-between; gap:16px; flex-wrap:wrap; margin-bottom:16px}
  .brand h1{font-family:var(--disp); font-weight:700; font-size:24px; letter-spacing:-.02em; margin:0; line-height:1}
  .brand p{margin:6px 0 0; color:var(--muted); font-size:13px}
  .tools{display:flex; gap:8px; flex-wrap:wrap}
  button{font-family:var(--body); cursor:pointer; border:1px solid var(--line-strong); background:var(--surface);
    color:var(--ink); border-radius:8px; padding:8px 12px; font-size:13px; font-weight:500; transition:.12s}
  button:hover{border-color:var(--ink)}
  button.ghost{background:transparent}
  button.primary{background:var(--ship); border-color:var(--ship); color:#fff}
  button.primary:hover{background:var(--ship-ink); border-color:var(--ship-ink)}
  button.danger{background:transparent; border-color:var(--deadline); color:var(--deadline)}
  button.danger:hover{background:var(--deadline); color:#fff}

  .control{display:flex; align-items:center; justify-content:space-between;
    gap:12px; flex-wrap:wrap; background:var(--surface); border:1px solid var(--line); border-radius:10px;
    padding:12px 16px; margin-bottom:10px}
  .navgroup{display:flex; align-items:center; gap:10px}
  .navgroup .year{font-family:var(--disp); font-weight:500; font-size:20px; min-width:96px; text-align:center; letter-spacing:-.01em}
  .iconbtn{width:34px; height:34px; padding:0; display:grid; place-items:center; font-size:18px; line-height:1}
  .legend{display:flex; gap:14px; align-items:center; font-size:12px; color:var(--muted); flex-wrap:wrap}
  
  .stat-month { border:1px solid var(--line-strong); border-radius:6px; padding:4px 6px; font-size:12px; font-family:var(--body); color:var(--ink); background:var(--surface); cursor:pointer; outline:none; transition:.15s; }
  .stat-month:focus { border-color:var(--ship); box-shadow:0 0 0 2px var(--ship-soft); }
  
  .dot{display:inline-block; width:11px; height:11px; border-radius:3px; vertical-align:-1px; margin-right:5px; border:1px solid rgba(0,0,0,.12)}
  .dot.ship{background:var(--ship); border-color:var(--ship)} .dot.dl{background:var(--deadline); border-color:var(--deadline)}
  .dot.g{background:var(--lv-green)} .dot.o{background:var(--lv-orange)} .dot.r{background:var(--lv-red)}
  .stat{font-family:var(--mono); font-size:12px; color:var(--muted)}
  .stat b{color:var(--ink); font-weight:700}

  .calscroll{width:100%; overflow-x:hidden; overflow-y:auto; max-height:calc(100vh - 168px); border:1px solid var(--line);
    border-radius:8px; background:var(--surface)}
  .cal{display:grid; grid-template-columns:0.5fr repeat(6,1fr); width:100%; background:var(--surface)}
  .dow-cell{position:sticky; top:0; z-index:15; background:var(--surface); padding:9px 10px;
    font-family:var(--disp); font-weight:500; font-size:12px; color:var(--muted); text-transform:uppercase;
    letter-spacing:.06em; border-left:1px solid var(--line); border-bottom:1px solid var(--line-strong)}
  .dow-cell:nth-child(7n+1){border-left:0}
  .dow-cell.sat{color:#2563a8} .dow-cell.sun{color:#b03a3a}

  .cell{min-width:0; overflow:hidden; min-height:118px; border-left:1px solid var(--line); border-top:1px solid var(--line);
    padding:4px 5px 6px; position:relative; cursor:pointer; background:var(--surface)}
  .cell:nth-child(7n+1){border-left:0}
  .cell.lv-green{background:var(--lv-green)}
  .cell.lv-orange{background:var(--lv-orange)}
  .cell.lv-red{background:var(--lv-red)}
  .cell.out{background:#FAFBFC}
  .cell.out .dnum{color:#B7C0C9}
  .cell:hover{filter:brightness(.975)}
  .cell .topline{display:flex; align-items:center; gap:6px}
  .cell .dnum{font-family:var(--mono); font-size:12px; color:var(--muted); font-weight:700}
  .cell.today .dnum{background:var(--ink); color:#fff; border-radius:6px; padding:1px 6px}
  .cell.sun .dnum{color:#b03a3a}
  .cell.holiday .dnum{color:#b03a3a}
  .holi-name{font-family:var(--body); font-size:9px; font-weight:600; color:#b03a3a; margin-top:1px;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .cell.holiday-sub .holi-name{font-style:italic}
  .cell .mbadge{font-family:var(--disp); font-weight:700; font-size:16px; color:var(--ship); letter-spacing:-.01em}
  .cell.traced{box-shadow:inset 0 0 0 2px var(--ship)}
  .cell.traced-dl{box-shadow:inset 0 0 0 2px var(--deadline)}
  .cell.drop-target{box-shadow:inset 0 0 0 3px var(--ship)!important; background:var(--ship-soft)}
  body.dragkind-dl .cell.drop-target{box-shadow:inset 0 0 0 3px var(--deadline)!important; background:var(--deadline-soft)}

  @keyframes flashpulse{
    0%,100%{box-shadow:inset 0 0 0 2px var(--deadline)}
    50%{box-shadow:inset 0 0 0 4px var(--deadline); background:#F6C6A8}
  }
  .cell.flash{animation:flashpulse .5s ease-in-out 5}
  @media (prefers-reduced-motion: reduce){ .cell.flash{animation:none; box-shadow:inset 0 0 0 3px var(--deadline)} }

  .seclabel{font-family:var(--disp); font-size:9px; font-weight:700; letter-spacing:.05em; text-transform:uppercase; margin-top:6px}
  .sl-ship{color:var(--ship)} .sl-dl{color:var(--deadline)}
  .sl-dl.divided{margin-top:7px; border-top:1px dashed var(--line-strong); padding-top:6px}
  .sec{display:flex; flex-direction:column; gap:3px; margin-top:3px}

  .chip{display:flex; align-items:center; gap:3px; font-size:10px; line-height:1.25; border-radius:5px;
    padding:2px 5px; border-left:3px solid; white-space:nowrap}
  .chip-txt{flex:1 1 auto; min-width:0; white-space:nowrap}
  .chip.sm{font-size:9px}
  .chip.wrapline{align-items:flex-start}
  .chip.wrapline .chip-txt{white-space:normal; overflow-wrap:anywhere; word-break:break-word}
  
  /* 아이콘 버튼 공통 */
  .chip-action {flex:0 0 auto; border:0; background:transparent; padding:0 2px; margin:0; font-size:12px;
    line-height:1; color:inherit; opacity:0; cursor:pointer; border-radius:4px}
  .chip:hover .chip-action {opacity:.65}
  .chip-action:hover {opacity:1; background:rgba(0,0,0,.08)}
  
  .chip.ship{background:var(--ship-soft); border-color:var(--ship); color:var(--ship-ink); touch-action:none; cursor:grab}
  .chip.ship:active{cursor:grabbing}
  .chip.dl{background:var(--deadline-soft); border-color:var(--deadline); color:var(--deadline-ink); touch-action:none; cursor:grab}
  .chip.dl:active{cursor:grabbing}
  .chip.dragging-src{opacity:.35}

  .drag-ghost{position:fixed; z-index:80; pointer-events:none; background:var(--ship); color:#fff; font-size:11px;
    font-weight:500; padding:4px 9px; border-radius:6px; box-shadow:0 8px 20px rgba(0,0,0,.32);
    transform:translate(-50%,-150%); white-space:nowrap; max-width:240px; overflow:hidden; text-overflow:ellipsis}
  .drag-ghost.dl{background:var(--deadline)}

  .scrim{position:fixed; inset:0; background:rgba(22,34,46,.45); display:none; align-items:flex-start;
    justify-content:center; padding:32px 16px; overflow:auto; z-index:50}
  .scrim.open{display:flex}
  .modal{background:var(--surface); border-radius:14px; width:100%; max-width:540px; box-shadow:0 24px 60px rgba(0,0,0,.25); overflow:hidden; animation:pop .14s ease-out}
  @keyframes pop{from{transform:translateY(8px) scale(.99); opacity:0} to{transform:none; opacity:1}}
  .mhead{display:flex; align-items:center; justify-content:space-between; padding:16px 20px; border-bottom:1px solid var(--line)}
  .mhead h2{font-family:var(--disp); font-size:17px; font-weight:500; margin:0}
  .mhead .x{border:0; background:transparent; font-size:22px; line-height:1; padding:2px 6px; color:var(--muted)}
  .mbody{padding:18px 20px}
  .mfoot{padding:14px 20px; border-top:1px solid var(--line); display:flex; justify-content:space-between; gap:8px}
  .mfoot .right{display:flex; gap:8px}
  .field{margin-bottom:13px}
  .field label{display:block; font-size:12px; font-weight:600; color:var(--muted); margin-bottom:5px}
  .field input, .field textarea{width:100%; font-family:var(--body); font-size:14px; color:var(--ink);
    border:1px solid var(--line-strong); border-radius:8px; padding:9px 10px; background:#fff}
  .field input:focus, .field textarea:focus{outline:none; border-color:var(--ship); box-shadow:0 0 0 3px var(--ship-soft)}
  .field textarea{resize:vertical; min-height:52px}
  .row2{display:grid; grid-template-columns:1fr 1fr; gap:12px}
  .req::after{content:" *"; color:var(--deadline)}

  .toast{position:fixed; left:50%; bottom:24px; transform:translateX(-50%) translateY(10px); background:var(--ink);
    color:#fff; padding:10px 16px; border-radius:10px; font-size:13px; opacity:0; pointer-events:none;
    transition:.25s; z-index:90; box-shadow:0 8px 24px rgba(0,0,0,.25); max-width:90vw}
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0)}

  .banner{background:#FFF6E6; border:1px solid #F0D9A8; color:#8a5a08; font-size:12.5px; border-radius:8px; padding:9px 12px; margin-bottom:12px; display:none}
  .banner.live{background:var(--ship-soft); border-color:var(--ship); color:var(--ship-ink)}
  input[type=file]{display:none}

  @media(max-width:640px){ body{padding:10px} .brand h1{font-size:20px} .cell{min-height:96px} }
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="brand">
      <h1>출하 캘린더</h1>
      <p>날짜 칸을 눌러 오더를 등록하고, 출하·서류마감 칩을 길게 눌러 드래그하면 해당 날짜가 바뀝니다.</p>
    </div>
    <div class="tools">
      <button class="ghost" id="btnImport">JSON 불러오기</button>
      <button class="ghost" id="btnExportJson">JSON 백업</button>
      <button class="ghost" id="btnExportCsv">CSV 내보내기</button>
      <input type="file" id="fileImport" accept="application/json,.json">
    </div>
  </div>

  <div class="banner" id="storageBanner">저장 기능을 사용할 수 없는 환경입니다. 입력 내용은 새로고침 시 사라질 수 있으니 <b>JSON 백업</b>으로 보관하세요.</div>
  <div class="banner live" id="liveBanner">🔄 공유 저장소(개별문서) 연결됨 - 변경 사항이 즉시 안전하게 저장됩니다.</div>

  <div class="control">
    <div class="navgroup">
      <button class="iconbtn" id="prevY" aria-label="이전 해">‹</button>
      <div class="year" id="yearLabel">—</div>
      <button class="iconbtn" id="nextY" aria-label="다음 해">›</button>
      <button class="ghost" id="today">오늘로</button>
    </div>
    <div class="legend">
      <select id="statMonth" class="stat-month" aria-label="통계 월 선택">
        <option value="all">1년 전체</option>
        <option value="01">1월</option>
        <option value="02">2월</option>
        <option value="03">3월</option>
        <option value="04">4월</option>
        <option value="05">5월</option>
        <option value="06">6월</option>
        <option value="07">7월</option>
        <option value="08">8월</option>
        <option value="09">9월</option>
        <option value="10">10월</option>
        <option value="11">11월</option>
        <option value="12">12월</option>
      </select>
      <span class="stat"><b id="statCount">0</b>건 · <b id="statTrucks">0</b>대 · <b id="statTonnage">0</b>톤</span>
      <span style="border-left:1px solid var(--line); padding-left:14px"><span class="dot ship"></span>출하</span>
      <span><span class="dot dl"></span>서류마감</span>
      <span style="border-left:1px solid var(--line); padding-left:14px"><span class="dot g"></span>≤25</span>
      <span><span class="dot o"></span>26–32</span>
      <span><span class="dot r"></span>33↑</span>
      <button class="primary" id="addBtn">+ 오더 추가</button>
    </div>
  </div>

  <div class="calscroll" id="calscroll"><div class="cal" id="cal"></div></div>
</div>

<div class="scrim" id="scrim"><div class="modal" id="modal"></div></div>
<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore-compat.js"></script>
<script>
const KEY="export-shipment-orders-v1";
let orders=[];
let year=new Date().getFullYear();
let selectedId=null;

/* ---------- 실시간 공유 & 용량 무제한 컬렉션 방식 ---------- */
const FIREBASE_CONFIG={
  apiKey: "AIzaSyBCZYj7P4b8uYKu4zgQoW4rDyIYxmQl440",
  authDomain: "export-calendar-9c873.firebaseapp.com",
  projectId: "export-calendar-9c873",
  storageBucket: "export-calendar-9c873.firebasestorage.app",
  messagingSenderId: "604782156206",
  appId: "1:604782156206:web:eadf68003432987876503f"
};
const ROOM_ID="default"; 

let useFirebase=false, fsColRef=null, fsUnsub=null;
function initFirebase(){
  if(!FIREBASE_CONFIG.apiKey || FIREBASE_CONFIG.apiKey==="YOUR_API_KEY") return false;
  if(typeof firebase==="undefined") return false;
  try{
    firebase.initializeApp(FIREBASE_CONFIG);
    // 용량 제한을 우회하기 위해 '배열 1개'가 아닌 '컬렉션(폴더) 하위의 여러 문서'로 저장합니다.
    fsColRef=firebase.firestore().collection("shipmentRooms").doc(ROOM_ID).collection("orders");
    return true;
  }catch(e){ console.error("Firebase init 실패:", e); return false; }
}
useFirebase=initFirebase();

function subscribeRealtime(){
  if(!useFirebase) return;
  fsUnsub=fsColRef.onSnapshot(snap=>{
    orders = snap.docs.map(d => d.data());
    render();
  }, err=>{ console.error("실시간 동기화 오류:", err); });
}

const hasWS = typeof window!=="undefined" && window.storage && typeof window.storage.get==="function";
let memOnly=false;

const store={
  async load(){
    if(useFirebase){
      try{ 
        const snap=await fsColRef.get(); 
        return snap.docs.map(d => d.data()); 
      }catch(e){ return []; }
    }
    if(hasWS){ try{ const r=await window.storage.get(KEY); return r&&r.value?JSON.parse(r.value):[]; }catch(e){ return []; } }
    try{ const v=localStorage.getItem(KEY); return v?JSON.parse(v):[]; } catch(e){ memOnly=true; return []; }
  },
  
  // JSON 백업 등 전체 덮어쓰기용
  async saveBulk(){
    if(useFirebase){
      try {
        const batch = firebase.firestore().batch();
        orders.forEach(o => batch.set(fsColRef.doc(o.id), o));
        await batch.commit();
        return;
      } catch(e) { console.error("대량 저장 실패:", e); }
    }
    const data=JSON.stringify(orders);
    if(hasWS){ try{ await window.storage.set(KEY,data); return; }catch(e){} }
    try{ localStorage.setItem(KEY,data); }catch(e){ memOnly=true; }
  },
  
  // 1개의 오더만 수정/추가 (동시성 및 트래픽 최적화)
  async saveOne(o){
    if(useFirebase) await fsColRef.doc(o.id).set(o);
    else await this.saveBulk();
  },
  
  // 1개의 오더만 삭제
  async delOne(id){
    if(useFirebase) await fsColRef.doc(id).delete();
    else await this.saveBulk();
  }
};

const pad=n=>String(n).padStart(2,"0");
const key=(y,m,d)=>`${y}-${pad(m+1)}-${pad(d)}`;
const keyOf=dt=>key(dt.getFullYear(),dt.getMonth(),dt.getDate());
const todayKey=keyOf(new Date());
const WD=["일","월","화","수","목","금","토"];
function fmtKo(iso){ if(!iso) return "-"; const[y,m,d]=iso.split("-").map(Number); const dt=new Date(y,m-1,d);
  return `${m}월 ${d}일 (${WD[dt.getDay()]})`; }
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
function esc(s){ return (s==null?"":s).toString().replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c])); }
function lineOf(o){ return [o.company,o.poNo,o.carrier,o.port,o.trucks?`${o.trucks}대`:"", o.tonnage?`${o.tonnage}톤`:"", o.cfs].filter(Boolean).join(" · ")||"(내용 없음)"; }

let toastTimer=null;
function showToast(msg){ const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show");
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove("show"),3200); }

function buildIndex(){
  const ship={}, dl={};
  for(const o of orders){
    if(o.shipDate){ (ship[o.shipDate]=ship[o.shipDate]||[]).push(o); }
    if(o.docDeadline){ (dl[o.docDeadline]=dl[o.docDeadline]||[]).push(o); }
  }
  return {ship,dl};
}

/* ---------- 공휴일 ---------- */
const holidaysByYear={};
const FIXED_SOLAR_HOLIDAYS=[
  {md:[1,1],   name:"신정",      sub:false},
  {md:[3,1],   name:"삼일절",    sub:true},
  {md:[5,5],   name:"어린이날",  sub:true},
  {md:[6,6],   name:"현충일",    sub:false},
  {md:[7,17],  name:"제헌절",    sub:true,  fromYear:2026},
  {md:[8,15],  name:"광복절",    sub:true},
  {md:[10,3],  name:"개천절",    sub:true},
  {md:[10,9],  name:"한글날",    sub:true},
  {md:[12,25], name:"기독탄신일", sub:true},
];
function fixedSolarHolidayMap(y){
  const fixedDates=new Set();
  const entries=[];
  FIXED_SOLAR_HOLIDAYS.forEach(h=>{
    if(h.fromYear && y<h.fromYear) return;
    const d=new Date(y,h.md[0]-1,h.md[1]);
    const k=keyOf(d);
    fixedDates.add(k);
    entries.push({key:k, name:h.name, sub:h.sub, dow:d.getDay()});
  });
  const map={};
  entries.forEach(e=>{ map[e.key]={name:e.name, base:e.name, sub:false}; });
  entries.forEach(e=>{
    if(!e.sub || (e.dow!==0 && e.dow!==6)) return;
    let d=new Date(e.key+"T00:00:00");
    do{ d.setDate(d.getDate()+1); } while(d.getDay()===0 || d.getDay()===6 || fixedDates.has(keyOf(d)));
    const subKey=keyOf(d);
    if(!map[subKey]) map[subKey]={name:"대체공휴일", base:e.name, sub:true};
  });
  return map;
}

async function ensureHolidays(y){
  if(holidaysByYear[y]) return;
  try{
    const res=await fetch(`https://holidays.hyunbin.page/${y}.json`);
    if(!res.ok) throw new Error("bad response");
    const data=await res.json(); 
    const map={};
    Object.keys(data).forEach(date=>{
      const names=data[date];
      if(!names || !names.length) return;
      const full=names.join(" · ");
      const isSub=full.includes("대체공휴일");
      const base=isSub?full.replace(/\s*대체공휴일/g,"").trim():full;
      map[date]={name:isSub?"대체공휴일":full, base:base||full, sub:isSub};
    });
    if(Object.keys(map).length<3) Object.assign(map, fixedSolarHolidayMap(y), map);
    holidaysByYear[y]=map;
  }catch(e){ holidaysByYear[y]=fixedSolarHolidayMap(y); }
}

function updateStats() {
  const selectedMonth = document.getElementById("statMonth").value;
  let yc=0, yt=0, yton=0;
  
  orders.forEach(o=>{ 
    if(o.shipDate && +o.shipDate.slice(0,4)===year){ 
      if(selectedMonth === "all" || o.shipDate.slice(5,7) === selectedMonth) {
        yc++; 
        yt+=Number(o.trucks)||0; 
        yton+=Number(o.tonnage)||0; 
      }
    } 
  });
  
  document.getElementById("statCount").textContent=yc;
  document.getElementById("statTrucks").textContent=yt;
  document.getElementById("statTonnage").textContent=Number(yton.toFixed(2));
}

document.getElementById("statMonth").addEventListener("change", updateStats);

function render(){
  const neededYears=[year-1,year,year+1];
  const missing=neededYears.filter(y=>!holidaysByYear[y]);
  if(missing.length){
    Promise.all(missing.map(ensureHolidays)).then(render);
  }
  document.getElementById("yearLabel").textContent=`${year}년`;
  const idx=buildIndex();
  const cal=document.getElementById("cal");

  const start=new Date(year,0,1);
  const lead=start.getDay();
  const gridStart=new Date(year,0,1-lead);
  const end=new Date(year,11,31);
  const trail=6-end.getDay();
  const gridEnd=new Date(year,11,31+trail);
  const sel = selectedId ? orders.find(o=>o.id===selectedId) : null;

  const dows=[["Sun 일","sun"],["Mon 월",""],["Tue 화",""],["Wed 수",""],["Thu 목",""],["Fri 금",""],["Sat 토","sat"]];
  let html = dows.map(d=>`<div class="dow-cell ${d[1]}">${d[0]}</div>`).join("");

  let col=0;
  for(let dt=new Date(gridStart); dt<=gridEnd; dt.setDate(dt.getDate()+1)){
    const k=keyOf(dt);
    const inYear=dt.getFullYear()===year;
    const ships=idx.ship[k]||[], dls=idx.dl[k]||[];
    
    let dayTrucks=0, dayTonnage=0; 
    ships.forEach(o=>{
      dayTrucks+=Number(o.trucks)||0;
      dayTonnage+=Number(o.tonnage)||0;
    });

    const holi=(holidaysByYear[dt.getFullYear()]||{})[k];

    let cls="cell";
    if(!inYear) cls+=" out";
    if(col===0) cls+=" sun";
    if(holi) cls+=" holiday";
    if(holi && holi.sub) cls+=" holiday-sub";
    if(k===todayKey) cls+=" today";
    if(sel && sel.shipDate===k) cls+=" traced";
    if(sel && sel.docDeadline===k) cls+=" traced-dl";
    if(ships.length) cls += dayTrucks>=33 ? " lv-red" : dayTrucks>=26 ? " lv-orange" : " lv-green";

    const mbadge = dt.getDate()===1 ? `<span class="mbadge">${dt.getMonth()+1}월</span>` : "";
    let inner=`<div class="topline"><span class="dnum">${dt.getDate()}</span>${mbadge}</div>`;
    if(holi) inner+=`<div class="holi-name" title="${esc(holi.sub?`대체공휴일 (${holi.base})`:holi.name)}">${esc(holi.name)}</div>`;

    if(ships.length){
      const tonStr = dayTonnage > 0 ? ` · ${Number(dayTonnage.toFixed(2))}톤` : "";
      inner+=`<div class="seclabel sl-ship">출하 ${ships.length} · ${dayTrucks}대${tonStr}</div><div class="sec">`;
      ships.forEach(o=>{ const line=lineOf(o);
        inner+=`<div class="chip ship" data-id="${o.id}" title="${esc(line)}"><span class="chip-txt">${esc(line)}</span>
          <button class="chip-action chip-split" data-id="${o.id}" title="이 오더 분할하기" aria-label="분할">✂️</button>
          <button class="chip-action chip-edit" data-id="${o.id}" title="수정" aria-label="수정">✎</button></div>`; });
      inner+=`</div>`;
    }
    if(dls.length){
      inner+=`<div class="seclabel sl-dl ${ships.length?"divided":""}">서류마감 ${dls.length}</div><div class="sec">`;
      dls.forEach(o=>{ const line=lineOf(o);
        inner+=`<div class="chip dl" data-id="${o.id}" title="서류마감 · ${esc(line)}"><span class="chip-txt">${esc(line)}</span>
          <button class="chip-action chip-edit" data-id="${o.id}" title="수정" aria-label="수정">✎</button></div>`; });
      inner+=`</div>`;
    }
    html+=`<div class="${cls}" data-date="${k}">${inner}</div>`;
    col=(col+1)%7;
  }
  cal.innerHTML=html;

  updateStats();
  refit();
}

function refit(){
  const txts=[...document.querySelectorAll(".cal .chip-txt")];
  txts.forEach(t=>{ t.parentElement.classList.remove("sm","wrapline"); });
  const over=txts.filter(t=> t.scrollWidth > t.clientWidth + 1);   
  over.forEach(t=> t.parentElement.classList.add("sm"));           
  over.forEach(t=>{ if(t.scrollWidth > t.clientWidth + 1) t.parentElement.classList.add("wrapline"); }); 
}
let _refitTimer;
window.addEventListener("resize",()=>{ clearTimeout(_refitTimer); _refitTimer=setTimeout(refit,150); });

function scrollToToday(){
  const c=[...document.querySelectorAll(".cell")].find(x=>x.dataset.date===todayKey);
  if(c) c.scrollIntoView({block:"center",behavior:"smooth"});
}

/* ---------- drag to reschedule ship date ---------- */
let drag=null, holdTimer=null, justDragged=false;
const grid=document.getElementById("cal");
const pane=document.getElementById("calscroll");

grid.addEventListener("pointerdown",e=>{
  if(e.pointerType==="mouse" && e.button!==0) return;
  if(e.target.closest(".chip-action")) return; 
  const chip=e.target.closest(".chip");
  if(!chip) return;
  const kind=chip.classList.contains("dl")?"dl":"ship";
  drag={id:chip.dataset.id, kind, chip, sx:e.clientX, sy:e.clientY, curX:e.clientX, curY:e.clientY, active:false, ghost:null, lastTarget:null};
  holdTimer=setTimeout(()=>beginDrag(), 220);
  window.addEventListener("pointermove",onMove);
  window.addEventListener("pointerup",onUp);
});

function beginDrag(){
  if(!drag) return;
  drag.active=true;
  document.body.style.userSelect="none";
  document.body.classList.add(drag.kind==="dl"?"dragkind-dl":"dragkind-ship");
  const o=orders.find(z=>z.id===drag.id);
  const g=document.createElement("div");
  g.className="drag-ghost"+(drag.kind==="dl"?" dl":"");
  g.textContent=o?lineOf(o):"";
  document.body.appendChild(g);
  drag.ghost=g;
  drag.chip.classList.add("dragging-src");
  moveGhost();
}
function moveGhost(){ if(drag&&drag.ghost){ drag.ghost.style.left=drag.curX+"px"; drag.ghost.style.top=drag.curY+"px"; } }
function updateTarget(){
  const el=document.elementFromPoint(drag.curX,drag.curY);
  const cell=el?el.closest(".cell"):null;
  if(drag.lastTarget && drag.lastTarget!==cell) drag.lastTarget.classList.remove("drop-target");
  if(cell && cell.dataset.date){ cell.classList.add("drop-target"); drag.lastTarget=cell; } else drag.lastTarget=null;
}
function onMove(e){
  if(!drag) return;
  drag.curX=e.clientX; drag.curY=e.clientY;
  if(!drag.active){
    if(Math.hypot(e.clientX-drag.sx,e.clientY-drag.sy)>10){ clearTimeout(holdTimer); teardownMove(); drag=null; }
    return;
  }
  e.preventDefault();
  moveGhost(); updateTarget();
  const r=pane.getBoundingClientRect(), m=56;
  if(e.clientY<r.top+m) pane.scrollTop-=14;
  else if(e.clientY>r.bottom-m) pane.scrollTop+=14;
  if(e.clientX<r.left+m) pane.scrollLeft-=14;
  else if(e.clientX>r.right-m) pane.scrollLeft+=14;
}
function teardownMove(){ window.removeEventListener("pointermove",onMove); window.removeEventListener("pointerup",onUp); }
function cleanupDrag(){
  if(drag&&drag.ghost) drag.ghost.remove();
  document.querySelectorAll(".drop-target").forEach(c=>c.classList.remove("drop-target"));
  document.querySelectorAll(".dragging-src").forEach(c=>c.classList.remove("dragging-src"));
  document.body.classList.remove("dragkind-dl","dragkind-ship");
  document.body.style.userSelect="";
  drag=null;
}
async function onUp(){
  clearTimeout(holdTimer);
  teardownMove();
  if(drag && drag.active){
    const cell=drag.lastTarget;
    const o=orders.find(z=>z.id===drag.id);
    const kind=drag.kind;
    let moved=false;
    if(cell && o){
      const nd=cell.dataset.date;
      const cur = kind==="dl" ? (o.docDeadline||"") : o.shipDate;
      if(nd!==cur){
        if(kind==="dl") o.docDeadline=nd; else o.shipDate=nd;
        selectedId=o.id; moved=true;
        cleanupDrag(); 
        await store.saveOne(o); // 개별 저장 방식으로 변경
        render();
        showToast(`${o.company||"오더"} ${kind==="dl"?"서류마감일":"출하일"} → ${fmtKo(nd)}`);
      }
    }
    if(!moved) cleanupDrag();
    justDragged=true; setTimeout(()=>{ justDragged=false; },60);
  } else { drag=null; }
}

/* ---------- click: edit / split / flash / add ---------- */
function flashCell(dk){
  const cell=[...document.querySelectorAll(".cell")].find(c=>c.dataset.date===dk);
  if(!cell) return false;
  cell.classList.remove("flash"); void cell.offsetWidth; cell.classList.add("flash");
  cell.scrollIntoView({block:"nearest",behavior:"smooth"});
  setTimeout(()=>cell.classList.remove("flash"),2600);
  return true;
}

function selectAndFlash(id, clickedDeadline){
  const o=orders.find(x=>x.id===id); if(!o) return;
  selectedId=id; render();
  
  let target = clickedDeadline ? o.shipDate : o.docDeadline;
  
  if (!clickedDeadline && !target && o.parentId) {
     const parent = orders.find(x => (x.id === o.parentId || x.parentId === o.parentId) && x.docDeadline);
     if (parent && parent.docDeadline) target = parent.docDeadline;
  }

  const label = clickedDeadline ? "출하일" : "서류마감일";
  if(!target){ showToast(`${o.company||"오더"} · ${label} 미입력`); return; }
  if(+target.slice(0,4)===year) flashCell(target);
  else showToast(`${o.company||"오더"} · ${label} ${fmtKo(target)} (${target.slice(0,4)}년)`);
}

grid.addEventListener("click",e=>{
  const splitBtn=e.target.closest(".chip-split");
  if(splitBtn){ splitModal(splitBtn.dataset.id); return; }
  
  const editBtn=e.target.closest(".chip-edit");
  if(editBtn){ const o=orders.find(x=>x.id===editBtn.dataset.id); if(o) formModal(o); return; }
  
  if(justDragged) return;
  const chip=e.target.closest(".chip");
  if(chip){ selectAndFlash(chip.dataset.id, chip.classList.contains("dl")); return; }
  const cell=e.target.closest(".cell");
  if(cell && cell.dataset.date){ formModal(null,cell.dataset.date); }
});

/* ---------- modal ---------- */
const scrim=document.getElementById("scrim");
const modal=document.getElementById("modal");
function openModal(html){ modal.innerHTML=html; scrim.classList.add("open"); }
function closeModal(){ scrim.classList.remove("open"); }
scrim.addEventListener("click",e=>{ if(e.target===scrim) closeModal(); });
document.addEventListener("keydown",e=>{ if(e.key==="Escape") closeModal(); });

function splitModal(id){
  const o = orders.find(x=>x.id===id);
  if(!o) return;
  openModal(`
    <div class="mhead"><h2>✂️ 오더 분할하기</h2><button class="x" onclick="closeModal()">×</button></div>
    <div class="mbody">
      <div class="banner live" style="display:block; margin-bottom:16px;">
        원본 오더에서 입력한 수량만큼 차감하고, 새로운 날짜에 분할된 오더를 생성합니다. 서류마감일은 자동으로 원본과 연동됩니다.
      </div>
      <div class="field"><label class="req">이동할 출하일</label><input type="date" id="s_ship"></div>
      <div class="row2">
        <div class="field"><label>이동할 차량 댓수 (현재 ${o.trucks||0}대)</label><input type="number" min="0" max="${o.trucks||0}" id="s_trucks" placeholder="예: 2"></div>
        <div class="field"><label>이동할 톤수 (현재 ${o.tonnage||0}톤)</label><input type="number" min="0" step="any" max="${o.tonnage||0}" id="s_tonnage" placeholder="예: 12.5"></div>
      </div>
    </div>
    <div class="mfoot">
      <span></span>
      <div class="right"><button class="ghost" onclick="closeModal()">취소</button>
        <button class="primary" onclick="saveSplit('${id}')">분할 저장</button></div>
    </div>`);
}

async function saveSplit(id) {
  const o = orders.find(x=>x.id===id);
  const sDate = document.getElementById("s_ship").value;
  const sTk = Number(document.getElementById("s_trucks").value)||0;
  const sTon = Number(document.getElementById("s_tonnage").value)||0;

  if(!sDate){ alert("이동할 출하일을 선택하세요."); return; }
  if(sTk<=0 && sTon<=0){ alert("이동할 댓수나 톤수를 입력하세요."); return; }

  // 1. 기존 오더 업데이트
  o.trucks = Math.max(0, (Number(o.trucks)||0) - sTk);
  o.tonnage = Math.max(0, (Number(o.tonnage)||0) - sTon);

  // 2. 새 오더 복제
  const newO = { ...o };
  newO.id = uid();
  newO.shipDate = sDate;
  newO.trucks = sTk || "";
  newO.tonnage = sTon || "";
  newO.docDeadline = ""; 
  newO.parentId = o.parentId || o.id; 
  
  if(o.memo) newO.memo = o.memo + " (분할됨)";

  orders.push(newO);
  selectedId = newO.id;
  
  // 두 문서를 각각 핀포인트로 저장 (동시성 최적화)
  await store.saveOne(o);
  await store.saveOne(newO);
  
  closeModal(); 
  render();
  showToast("오더가 성공적으로 분할되었습니다.");
}

function formModal(o, presetDate){
  const isEdit=!!o; o=o||{};
  const ship=o.shipDate||presetDate||todayKey;
  openModal(`
    <div class="mhead"><h2>${isEdit?"오더 수정":"오더 추가"}</h2><button class="x" onclick="closeModal()">×</button></div>
    <div class="mbody">
      <div class="row2">
        <div class="field"><label class="req">출하일 (입고일)</label><input type="date" id="f_ship" value="${ship}"></div>
        <div class="field"><label>서류 마감일</label><input type="date" id="f_dl" value="${o.docDeadline||""}"></div>
      </div>
      <div class="field"><label class="req">상사명</label><input id="f_co" value="${esc(o.company)}" placeholder="예: 포스코인터내셔널"></div>
      <div class="row2">
        <div class="field"><label>PO 번호</label><input id="f_po" value="${esc(o.poNo)}" placeholder="예: LICX5117"></div>
        <div class="field"><label>선사명</label><input id="f_carrier" value="${esc(o.carrier)}" placeholder="예: EVKR / WUOK"></div>
      </div>
      <div class="row2">
        <div class="field"><label>도착지 항구명</label><input id="f_port" value="${esc(o.port)}" placeholder="예: SYDNEY"></div>
        <div class="field"><label>차량 댓수</label><input id="f_trucks" type="number" min="0" value="${o.trucks==null?"":o.trucks}" placeholder="예: 12"></div>
      </div>
      <div class="row2">
        <div class="field"><label>선적지 도착 CFS명</label><input id="f_cfs" value="${esc(o.cfs)}" placeholder="예: 부산 신항 CFS"></div>
        <div class="field"><label>톤수</label><input id="f_tonnage" type="number" min="0" step="any" value="${o.tonnage==null?"":o.tonnage}" placeholder="예: 24.5"></div>
      </div>
      <div class="field"><label>메모</label><textarea id="f_memo" placeholder="구분(STD/DW/동전 등), 비고">${esc(o.memo)}</textarea></div>
    </div>
    <div class="mfoot">
      ${isEdit?`<button class="danger" onclick="delOrder('${o.id}')">삭제</button>`:`<span></span>`}
      <div class="right"><button class="ghost" onclick="closeModal()">취소</button>
        <button class="primary" onclick="saveOrder('${isEdit?o.id:""}')">저장</button></div>
    </div>`);
  setTimeout(()=>{ const el=document.getElementById("f_co"); if(el) el.focus(); },30);
}

async function saveOrder(id){
  const co=document.getElementById("f_co").value.trim();
  const ship=document.getElementById("f_ship").value;
  if(!ship){ alert("출하일을 선택하세요."); return; }
  if(!co){ alert("상사명을 입력하세요."); return; }
  
  const o=orders.find(x=>x.id===id)||{};
  const rec={ id:id||uid(), shipDate:ship, docDeadline:document.getElementById("f_dl").value||"", company:co,
    poNo:document.getElementById("f_po").value.trim(), carrier:document.getElementById("f_carrier").value.trim(),
    port:document.getElementById("f_port").value.trim(), trucks:document.getElementById("f_trucks").value.trim(),
    cfs:document.getElementById("f_cfs").value.trim(), tonnage:document.getElementById("f_tonnage").value.trim(),
    memo:document.getElementById("f_memo").value.trim(),
    parentId: o.parentId || null 
  };
    
  if(id){ const i=orders.findIndex(x=>x.id===id); if(i>-1) orders[i]=rec; } else orders.push(rec);
  selectedId=rec.id;
  if(+ship.slice(0,4)!==year) year=+ship.slice(0,4);
  
  // 1개의 오더만 개별 저장
  await store.saveOne(rec); 
  closeModal(); 
  render();
}

async function delOrder(id){
  if(!confirm("이 오더를 삭제할까요?")) return;
  orders=orders.filter(o=>o.id!==id);
  if(selectedId===id) selectedId=null;
  
  // 1개의 오더만 개별 삭제
  await store.delOne(id); 
  closeModal(); 
  render();
}

/* ---------- nav ---------- */
document.getElementById("prevY").onclick=()=>{ year--; render(); pane.scrollTop=0; };
document.getElementById("nextY").onclick=()=>{ year++; render(); pane.scrollTop=0; };
document.getElementById("today").onclick=()=>{ year=new Date().getFullYear(); render(); setTimeout(scrollToToday,60); };
document.getElementById("addBtn").onclick=()=>formModal(null,null);

/* ---------- export / import ---------- */
function download(name,content,type){
  const blob=new Blob([content],{type}); const url=URL.createObjectURL(blob);
  const a=document.createElement("a"); a.href=url; a.download=name; a.click(); setTimeout(()=>URL.revokeObjectURL(url),1000);
}
document.getElementById("btnExportJson").onclick=()=>download(`shipment-backup-${todayKey}.json`, JSON.stringify(orders,null,2),"application/json");
document.getElementById("btnExportCsv").onclick=()=>{
  const head=["출하일","상사명","PO번호","선사명","도착지항구","차량댓수","톤수","도착CFS","서류마감일","메모"];
  const q=s=>`"${(s==null?"":s).toString().replace(/"/g,'""')}"`;
  const lines=[head.join(",")].concat([...orders].sort((a,b)=>(a.shipDate||"").localeCompare(b.shipDate||""))
    .map(o=>[o.shipDate,o.company,o.poNo,o.carrier,o.port,o.trucks,o.tonnage,o.cfs,o.docDeadline,o.memo].map(q).join(",")));
  download(`shipment-${todayKey}.csv`,"\uFEFF"+lines.join("\r\n"),"text/csv;charset=utf-8");
};
document.getElementById("btnImport").onclick=()=>document.getElementById("fileImport").click();
document.getElementById("fileImport").onchange=e=>{
  const f=e.target.files[0]; if(!f) return; const r=new FileReader();
  r.onload=async()=>{
    try{
      const data=JSON.parse(r.result); if(!Array.isArray(data)) throw 0;
      if(orders.length && !confirm(`기존 ${orders.length}건을 불러온 ${data.length}건으로 교체할까요? (취소 시 병합)`)){
        const ids=new Set(orders.map(o=>o.id)); data.forEach(o=>{ if(!o.id||ids.has(o.id)) o.id=uid(); orders.push(o); });
      } else { orders=data.map(o=>Object.assign({id:o.id||uid()},o)); }
      await store.saveBulk(); render(); alert("불러오기 완료");
    }catch(err){ alert("올바른 JSON 백업 파일이 아닙니다."); }
    e.target.value="";
  };
  r.readAsText(f);
};

/* ---------- init ---------- */
(async()=>{
  orders=await store.load();
  let lsBlocked=false;
  if(!hasWS && !useFirebase){ try{ localStorage.setItem("__t","1"); localStorage.removeItem("__t"); }catch(e){ lsBlocked=true; } }
  if(!useFirebase && (memOnly || lsBlocked)) document.getElementById("storageBanner").style.display="block";
  if(useFirebase) document.getElementById("liveBanner").style.display="block";
  // 실시간 자동 반영 켬
  if(useFirebase) subscribeRealtime();
  render();
  if(document.fonts && document.fonts.ready) document.fonts.ready.then(refit);
  setTimeout(scrollToToday,80);
})();
</script>
